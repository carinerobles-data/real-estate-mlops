version: '3.8'

networks:
  app-network:
    driver: bridge

services:
  # Service de tracking MLflow
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    networks:
      - app-network
    ports:
      - "5001:5000"
    command: mlflow server --backend-store-uri /mlruns --default-artifact-root /mlruns --host 0.0.0.0
    volumes:
      - ./mlruns:/mlruns

  # API d'inférence
  api:
    build: .
    container_name: api
    networks:
      - app-network
    volumes:
      - .:/app
      - ./models:/app/models:ro
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      - MODEL_PATH=/app/models/model_production.json
    # Pas de port exposé directement ici, Nginx s'en occupe

  # Frontend Streamlit
  streamlit:
    build: .
    container_name: streamlit
    command: streamlit run streamlit_app.py --server.port 8501
    ports:
      - "8501:8501"
    networks:
      - app-network

  # Orchestration Airflow
  airflow:
    image: apache/airflow:2.9.1
    container_name: airflow
    restart: always
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/app
    ports:
      - "8080:8080"
    command: bash -c "airflow db init && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@admin.com --password admin && airflow webserver"
    networks:
      - app-network

  # Load Balancer
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - api

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - app-network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana_data: